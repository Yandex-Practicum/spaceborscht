apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: spaceborscht
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: cr.yandex/crpppobvo0dedl805s42/spaceborscht/frontend:latest
        ports:
          - name: metrics-port
            containerPort: 80
        env:
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: spaceborscht
spec:
  selector:
    app: frontend
  ports:
    - name: metrics-port
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP