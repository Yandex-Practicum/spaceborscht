apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-deployment
  namespace: spaceborscht
  labels:
    app: engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: engine
  template:
    metadata:
      labels:
        app: engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3001"
    spec:
      containers:
      - name: engine
        image: cr.yandex/crpppobvo0dedl805s42/spaceborscht/engine:latest
        ports:
          - name: metrics-port
            containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: OTEL_SERVICE_NAME
          value: "spaceborscht-engine"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tempo-distributor:4318/v1/traces"
        - name: ERROR_RATE_DEFAULT
          value: "0.1"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: engine-service
  namespace: spaceborscht
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3001"
spec:
  selector:
    app: engine
  ports:
    - name: metrics-port
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
