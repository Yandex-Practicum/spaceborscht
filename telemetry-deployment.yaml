apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-deployment
  namespace: spaceborscht
  labels:
    app: telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
    spec:
      containers:
      - name: telemetry
        image: cr.yandex/crpppobvo0dedl805s42/spaceborscht/telemetry:v1
        ports:
          - name: metrics-port
            containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: OTEL_SERVICE_NAME
          value: "spaceborscht-telemetry"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318/v1/traces"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: spaceborscht
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3002"
spec:
  selector:
    app: telemetry
  ports:
    - name: metrics-port
      protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP